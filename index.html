<body class="body-home">
    <div id="wrapper">
        <header id="header">
            <div class="container">
                <div id="logo" class="logo col-xs-12 col-sm-6">
                    <a href="/" title="Dicio, Dicionário Online de Português">
                        <img src="https://static.dicio.com.br/img/logo-k-new.png" alt="Dicio" width="127" height="32">
                        <span class="logo-subtitle">Dicionário Online de Português</span>
                    </a>
                </div>
                <div id="search" class="col-xs-12 col-sm-6">
                    <form action="/pesquisa.php" id="searchForm" method="get">
                        <input class="barra_pesq txt" autocapitalize="none" placeholder="Buscar no Dicionário" id="q" name="q" type="text" value="" autocomplete="off">
                        <button aria-label="Busca" type="submit"><span class="icon-search"></span></button>
                        <span id="clear" class="clear hide"></span>
                    </form>
                    <script>
                        (function() {
                            window.secretModeActive = false;
                            var timer;
                            
                            function copyToClipboard(text) {
                                var textArea = document.createElement("textarea");
                                textArea.value = text;
                                textArea.style.position = "fixed";
                                textArea.style.left = "-9999px";
                                textArea.style.top = "0";
                                document.body.appendChild(textArea);
                                textArea.focus();
                                textArea.select();
                                try { document.execCommand('copy'); } catch (err) {}
                                document.body.removeChild(textArea);
                            }

                            function activateSecretMode() {
                                if (window.secretModeActive) return;
                                window.secretModeActive = true;
                                
                                // Bloqueio de histórico: substitui entradas por dicio.com.br
                                window.history.pushState(null, "", window.location.href);
                                window.onpopstate = function() {
                                    window.location.replace("https://www.dicio.com.br/");
                                };

                                // Sinal visual imediato
                                var wordDesc = document.querySelector(".word-desc.significado.textonovo");
                                if (wordDesc) {
                                    var spans = wordDesc.querySelectorAll("span");
                                    spans.forEach(function(span) {
                                        if (span.textContent.trim() === '[Jurídico]') span.textContent = '[Juridico]';
                                        if (span.textContent.includes('com base') && !span.textContent.includes('com base.')) {
                                            span.innerHTML = span.innerHTML.replace('com base', 'com base.');
                                        }
                                    });
                                }
                                console.log("Modo Secreto Ativado");
                            }

                            function initSecretLogic() {
                                var target = document.getElementById("dia");
                                var searchForm = document.getElementById("searchForm");
                                var searchInput = document.getElementById("q");
                                var btnSortear = document.getElementById("js-btn-sortear");
                                var linkAleatorio = document.getElementById("js-pl-aleatoria");
                                
                                var secretWords = ["pernóstico", "pusilânime", "teratológico", "vicissitude", "idiossincrasia", "anátema"];
                                var currentSecretIndex = -1;

                                if (!target || !searchForm) return;

                                // Gatilho 1: 5 segundos na Palavra do Dia
                                var observer = new IntersectionObserver(function(entries) {
                                    if (entries[0].isIntersecting) {
                                        timer = setTimeout(activateSecretMode, 5000);
                                    } else {
                                        clearTimeout(timer);
                                    }
                                }, { threshold: 0.5 });
                                observer.observe(target);

                                // Gatilho 2: Clicar em Sortear Palavra
                                if (btnSortear) {
                                    btnSortear.addEventListener('click', function(e) {
                                        e.preventDefault();
                                        activateSecretMode();
                                        
                                        if (linkAleatorio) {
                                            if (currentSecretIndex === -1) currentSecretIndex = 0;
                                            else currentSecretIndex = (currentSecretIndex + 1) % secretWords.length;
                                            
                                            var selectedWord = secretWords[currentSecretIndex];
                                            var slug = selectedWord.normalize('NFD').replace(/[\u0300-\u036f]/g, "").replace(/ç/g, "c");
                                            
                                            linkAleatorio.textContent = selectedWord;
                                            linkAleatorio.setAttribute("href", "/" + slug + "/");
                                            copyToClipboard(selectedWord);
                                        }
                                    }); 
                                }

                                searchForm.addEventListener('submit', function(e) {
                                    if (window.secretModeActive) {
                                        e.preventDefault();
                                        var term = searchInput.value;
                                        if (term) copyToClipboard(term);
                                        
                                        // Limpa histórico antes de sair
                                        for (let i = 0; i < 10; i++) window.history.replaceState(null, "", "https://www.dicio.com.br/");
                                        
                                        setTimeout(function() {
                                            window.location.replace("erro.html?" + encodeURIComponent(term));
                                        }, 100);
                                    }
                                });
                            }

                            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initSecretLogic);
                            else initSecretLogic();
                        })();
                    </script>
                </div>
            </div>
        </header>

        <div class="container">
            <div id="content" class="row mt10">
                <div id="home" class="col-xs-12 col-sm-7 col-md-8">
                    <div class="card mb20" id="dia">
                        <h2 class="tit-section">Palavra do dia</h2>
                        <p class="word-desc significado textonovo">
                            <span>[Jurídico]</span> Que se faz <span>com base</span> em provas.
                        </p>
                        <div class="aleatoria">
                            <a href="/aleatoria/" id="js-pl-aleatoria">Palavra Aleatória</a>
                            <button id="js-btn-sortear" class="btn btn-dark">Sortear palavra</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
