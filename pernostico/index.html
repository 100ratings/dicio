<!DOCTYPE html><html lang="pt-br"><head>
    <meta charset="utf-8">
    <title>Pernóstico - Dicio, Dicionário Online de Português</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        /* Estilos básicos para garantir o visual se o CSS falhar */
        body { font-family: Roboto, sans-serif; background: #f5f5f5; margin: 0; }
        #header { background: #fff; padding: 10px 0; border-bottom: 1px solid #eee; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        .card { background: #fff; padding: 20px; margin-top: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .barra_pesq { width: 80%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #1c6fa7; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header id="header">
        <div class="container">
            <div id="logo">
                <a href="/" title="Dicio">
                    <img src="https://static.dicio.com.br/img/logo-k-new.png" alt="Dicio" width="127" height="32">
                </a>
            </div>
            <div id="search">
                <form id="searchForm">
                    <input class="barra_pesq" placeholder="Buscar no Dicionário" id="q" name="q" type="text" autocomplete="off">
                    <button type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h1>Pernóstico</h1>
            <p><strong>Significado de Pernóstico:</strong> adj. Que tem excesso de confiança em suas próprias qualidades ou que se orgulha de si próprio; presumido, pretensioso.</p>
        </div>
    </div>

    <script>
        (function() {
            // Modo Secreto Nativo no Pernóstico
            function copyToClipboard(text) {
                var textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); } catch (err) {}
                document.body.removeChild(textArea);
            }

            // Bloqueio de histórico imediato
            window.history.pushState(null, "", window.location.href);
            window.onpopstate = function() {
                window.location.replace("https://www.dicio.com.br/");
            };

            document.getElementById("searchForm").addEventListener("submit", function(e) {
                e.preventDefault();
                var term = document.getElementById("q").value;
                if (term) copyToClipboard(term);
                
                // Limpa histórico antes de sair
                for (let i = 0; i < 10; i++) window.history.replaceState(null, "", "https://www.dicio.com.br/");
                
                setTimeout(function() {
                    window.location.replace("../erro.html?" + encodeURIComponent(term));
                }, 100);
            });
        })();
    </script>
</body></html>
